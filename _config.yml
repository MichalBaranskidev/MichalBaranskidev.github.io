# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole site.
#
# If you need help with YAML syntax, here are some quick references:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: Michał Barański
title_separator: "-"
name: &name "Michał Barański"
description: >- # this means to ignore newlines until "email:"
  IT professional transitioning into DevOps.
  Security Engineer → DevOps.
  5 years in IT operations (NOC, SOC, Security).
  Currently building hands-on skills in Python, Docker, Git, AWS, Linux.
url: "https://michalbaranskidev.github.io"
avatar: "/assets/images/bio-photo.jpg"
bio: "Security Engineer → DevOps. Passionate about automation, cloud, and documentation."
location: "Gdańsk, Poland"
repository: "MichalBaranskidev/MichalBaranskidev.github.io"
github_username: MichalBaranskidev
linkedin_username: michalbaranski
email: abmis@o2.pl

# Build settings
remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "air" # "default", "air", "dark", "contrast", "mint"
search: true

# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: Europe/Warsaw

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

# mimic GitHub Pages with --safe
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

# Archives
#  Type
#  - GitHub Pages compatible archive pages built with Liquid ~> type: liquid (default)
#  - Jekyll Archives plugin archive pages ~> type: jekyll-archives
#  Path (examples)
#  - Archive page should exist at path when using Liquid method or you can
#    expect broken links (especially with breadcrumbs enabled)
#  - <base_path>/tags/my-awesome-tag/index.html ~> path: /tags/
#  - <base_path/categories/my-awesome-category/index.html ~> path: /categories/
#  - <base_path/my-awesome-category/index.html ~> path: /
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# Author
author:
  name: *name
  avatar: "/assets/images/bio-photo.jpg"
  bio: "Security Engineer → DevOps. 5 years in IT operations. Passionate about automation, cloud, and documentation."
  location: "Gdańsk, Poland"
  email: abmis@o2.pl
  uri: "https://michalbaranskidev.github.io"
  github: MichalBaranskidev
  linkedin: michalbaranski

# Social sharing
social:
  type: Person
  name: Michal Baranski
  links:
    - "https://github.com/MichalBaranskidev"
    - "https://linkedin.com/in/michalbaranski"

# Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/MichalBaranskidev"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/michalbaranski"

# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
      show_date: true
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .gitignore
  - .jekyll-assets-cache
  - .sass-cache
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gemfile.lock
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - package-lock.json
  - Rakefile
  - README
  - tmp
  - vendor

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/
timezone: Europe/Warsaw

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache