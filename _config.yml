# Site settings
title: Michał Barański
subtitle: IT professional transitioning into DevOps
description: DevOps learning journey – notes, case studies, labs
url: "https://michalbaranskidev.github.io"
baseurl: ""
repository: MichalBaranskidev/MichalBaranskidev.github.io

# Build settings
remote_theme: academicpages/academicpages.github.io
permalink: /:year/:month/:day/:title/
plugins:
  - jekyll-remote-theme
  - jekyll-paginate

# Pagination
paginate: 5
paginate_path: /blog/page:num/

# Navigation menu
navigation:
  - title: Home
    url: /
  - title: Blog
    url: /blog/
  - title: About
    url: /about/
  - title: CV
    url: /cv/

# Author info
author:
  name: "Michał Barański"
  bio: "Security Engineer → DevOps. 5 years in IT operations. Passionate about automation, cloud, and documentation."
  avatar: "/assets/images/avatar.png"
  location: "Gdańsk, Poland"
  email: "abmis@o2.pl"
  links:
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/MichalBaranskidev"
    - label: "LinkedIn"
      icon: "fab fa-linkedin"
      url: "https://linkedin.com/in/michalbaranski"

# Reading files
include:
  - .htaccess
exclude:
  - .github/
  - vendor/
  - Gemfile
  - Gemfile.lock