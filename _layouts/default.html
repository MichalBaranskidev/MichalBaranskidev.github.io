<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.6;
      background: #ffffff;
      color: #24292e;
    }

    h1, h2, h3 {
      border-bottom: 1px solid #eaecef;
      padding-bottom: 5px;
    }

    pre {
      background: #f6f8fa;
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
    }

    code {
      background: #f6f8fa;
      padding: 2px 5px;
      border-radius: 4px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin: 20px 0;
    }

    th, td {
      border: 1px solid #d0d7de;
      padding: 8px;
    }

    th {
      background: #f6f8fa;
    }

    a {
      color: #0969da;
    }

    blockquote {
      border-left: 4px solid #d0d7de;
      padding-left: 10px;
      color: #57606a;
    }
  </style>
</head>
<body>

  <h1>{{ site.title }}</h1>

  {{ content }}

</body>
</html>
